<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Orders | FSCommerce by Fatahshaheen OS</title>
  
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="css/style.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#e3f6ea', 100: '#c9ebd5', 500: '#118B50', 600: '#0d7040', 900: '#063922' }
          },
          fontFamily: { outfit: ['Outfit', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body x-data="{ sidebarToggle: false }" class="bg-gray-50 text-gray-800 font-outfit antialiased flex h-screen overflow-hidden dark:bg-gray-900 dark:text-gray-200">

  <!-- ================= SIDEBAR START ================= -->
  <aside :class="sidebarToggle ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'" 
         class="fixed left-0 top-0 z-50 flex h-screen w-64 flex-col border-r border-gray-200 bg-white transition-transform duration-300 dark:border-gray-800 dark:bg-gray-950 lg:static">
    
    <div class="flex items-center justify-between px-6 py-6 border-b border-gray-100 dark:border-gray-800">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded bg-brand-500 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
        </div>
        <div>
            <h2 class="text-lg font-bold text-gray-900 dark:text-white leading-none">FSCommerce</h2>
            <span class="text-[10px] text-gray-400 uppercase tracking-widest">Fatahshaheen OS</span>
        </div>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto px-4 py-6 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 rounded-lg px-3 py-2.5 font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition dark:text-gray-400 dark:hover:bg-gray-800">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="products.html" class="flex items-center gap-3 rounded-lg px-3 py-2.5 font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
        Products
      </a>
      <a href="orders.html" class="flex items-center gap-3 rounded-lg bg-brand-50 text-brand-600 px-3 py-2.5 font-medium transition dark:bg-brand-500/10 dark:text-brand-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        Orders
      </a>
    </nav>
  </aside>
  <!-- ================= SIDEBAR END ================= -->

  <!-- ================= MAIN CONTENT AREA ================= -->
  <div class="flex-1 flex flex-col min-w-0 overflow-y-auto bg-gray-50 dark:bg-gray-900">
    
    <!-- Top Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between dark:bg-gray-950 dark:border-gray-800">
      <div class="flex items-center gap-4">
        <button @click="sidebarToggle = true" class="lg:hidden text-gray-500">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h1 class="text-xl font-bold text-gray-900 dark:text-white">Orders Management</h1>
      </div>
      
      <!-- Developer Test Button (For testing before Storefront is ready) -->
      <button id="createTestOrderBtn" class="text-xs bg-gray-800 text-white px-3 py-1.5 rounded hover:bg-gray-700 transition">
        Simulate Test Order
      </button>
    </header>

    <!-- Main Workspace -->
    <main class="p-6 lg:p-8">
      
      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 dark:bg-gray-800 dark:border-gray-700 overflow-hidden">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
          <h3 class="text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2">
            <svg class="w-5 h-5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            Recent Orders
          </h3>
          
          <!-- Filters (Visual Only for now) -->
          <div class="flex gap-2">
            <select class="text-sm border border-gray-300 rounded-lg px-3 py-1.5 outline-none dark:bg-gray-900 dark:border-gray-600 dark:text-white">
              <option>All Orders</option>
              <option>Pending</option>
              <option>Shipped</option>
            </select>
          </div>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="border-b border-gray-200 text-sm font-semibold text-gray-500 dark:border-gray-700">
                <th class="pb-3 px-4">Order ID</th>
                <th class="pb-3 px-4">Customer Details</th>
                <th class="pb-3 px-4">Product</th>
                <th class="pb-3 px-4">Total Amount</th>
                <th class="pb-3 px-4">Status</th>
                <th class="pb-3 px-4 text-right">Update Status</th>
              </tr>
            </thead>
            <tbody id="ordersTableBody" class="text-sm divide-y divide-gray-100 dark:divide-gray-700">
              <!-- Dynamically loaded from Firebase -->
              <tr>
                <td colspan="6" class="py-8 text-center text-gray-400">Loading incoming orders...</td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
      
    </main>
  </div>

  <script type="module" src="js/index.js"></script>
</body>
</html>
