<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="icon" type="image/png" href="icon.png" />
    <title>Create Your Store | FSCommerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans antialiased">
    
    <div class="flex h-screen w-full">
      
      <div class="flex-1 flex flex-col justify-center px-6 lg:px-12 w-full lg:w-1/2 overflow-y-auto">
        <div class="max-w-md w-full mx-auto py-10">
          
          <a href="index.html" class="inline-flex items-center text-sm text-brand-600 hover:text-brand-800 font-medium mb-8">
            &larr; Back to FSCommerce
          </a>

          <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Launch Your Business</h1>
            <p class="text-gray-500">Fill in your details to create your digital storefront in seconds.</p>
          </div>

          <form id="storeSignupForm" x-data="{ storeName: '' }" class="space-y-5">
            
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">First Name *</label>
                <input type="text" id="fname" required class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" placeholder="Ali">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Last Name *</label>
                <input type="text" id="lname" required class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" placeholder="Khan">
              </div>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Email Address *</label>
              <input type="email" id="email" required class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" placeholder="admin@store.com">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Password *</label>
              <input type="password" id="password" required class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" placeholder="••••••••">
            </div>

            <div class="border-t border-gray-200 my-4"></div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Store Name *</label>
              <input type="text" id="storeNameInput" x-model="storeName" required class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" placeholder="e.g. Dina Electronics">
              <p class="mt-2 text-sm text-gray-500 flex items-center gap-1">
                <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                Your URL: <strong class="text-green-700" x-text="storeName ? storeName.toLowerCase().replace(/[^a-z0-9]/g, '') + '.fsc.js.org' : 'yourstore.fsc.js.org'"></strong>
              </p>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Store Type</label>
                <select id="storeType" class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                  <option value="retail">Retail / Physical Goods</option>
                  <option value="digital">Digital Products</option>
                  <option value="services">Services</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                <select id="storeSubType" class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                  <option value="electronics">Electronics & Tech</option>
                  <option value="fashion">Clothing & Fashion</option>
                  <option value="grocery">Grocery & Food</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>

            <button type="submit" id="createStoreBtn" class="w-full mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-lg">
              Create My Store
            </button>
            <p id="errorMsg" class="text-red-500 text-sm mt-2 hidden"></p>

          </form>

        </div>
      </div>

      <div class="hidden lg:flex lg:w-1/2 bg-gray-900 text-white flex-col justify-center items-center relative overflow-hidden">
        <div class="absolute inset-0 bg-green-500/10 backdrop-blur-3xl"></div>
        <div class="z-10 text-center max-w-md">
          <div class="w-20 h-20 bg-green-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-green-500/50">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
          </div>
          <h2 class="text-4xl font-bold mb-4">FSCommerce</h2>
          <p class="text-gray-400 text-lg">Powered by Fatahshaheen OS</p>
          <p class="mt-6 text-gray-500 text-sm border-t border-gray-700 pt-6">Enterprise-grade infrastructure for local markets. Fast, secure, and scalable.</p>
        </div>
      </div>

    </div>

    <script type="module" src=".js/index.js"></script>
  </body>
</html>
